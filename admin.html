<div id="sidebar">
    <h3>HSC MASTER</h3>
    <button class="nav-btn" onclick="drawUserMgmt()">User Management</button>
    <button class="nav-btn" onclick="drawAssignMgmt()">Assignment Management</button>
    <button class="nav-btn" onclick="drawGradeMgmt()">Grade Management</button>
    <button class="nav-btn" onclick="drawTracking()">Turn In Tracking</button>
    <button class="nav-btn" style="background:#ff4b4b;color:white" onclick="logout()">Sign Out</button>
</div>
<div id="content"></div>

<script type="module">
    import { hsc } from './hsc-core.js';

    // Gatekeeper: Ensures only admins can view this page
    const session = JSON.parse(localStorage.getItem('HSC_CURRENT_USER'));
    if (!session || session.role !== 'admin') {
        window.location.href = 'index.html';
    }

    window.logout = () => { 
        localStorage.removeItem('HSC_CURRENT_USER'); 
        window.location.href='index.html'; 
    };

    // --- USER MANAGEMENT (Integrated with Add Student functionality) ---
    window.drawUserMgmt = () => {
        let html = `
            <h1>User Management</h1>
            <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--hsc-accent);">
                <h3>Register New Student</h3>
                <input id="new-name" placeholder="Full Name" style="background:rgba(255,255,255,0.1); color:white; border:1px solid white; padding:8px; margin:5px;">
                <input id="new-user" placeholder="Username" style="background:rgba(255,255,255,0.1); color:white; border:1px solid white; padding:8px; margin:5px;">
                <input id="new-pass" type="password" placeholder="Password" style="background:rgba(255,255,255,0.1); color:white; border:1px solid white; padding:8px; margin:5px;">
                <button onclick="addNewStudent()" style="background: var(--hsc-accent); color: var(--hsc-blue); border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 4px;">+ Create Student</button>
            </div>
            <table>
                <tr><th>Name</th><th>Credentials</th><th>Action</th></tr>`;
        
        hsc.db.users.forEach(u => {
            html += `<tr>
                <td><input id="n-${u.id}" value="${u.name}" style="background:transparent; color:white; border:none; border-bottom:1px solid rgba(255,255,255,0.2);"></td>
                <td>
                    U: <input id="u-${u.id}" value="${u.username}" style="width:80px; background:transparent; color:white; border:none;">
                    P: <input id="p-${u.id}" value="${u.password}" style="width:80px; background:transparent; color:white; border:none;">
                </td>
                <td>
                    <button onclick="saveUser('${u.id}')">Save</button>
                    <button onclick="deleteUser('${u.id}')" style="background:#ff4b4b; color:white; border:none; padding:5px; cursor:pointer; margin-left:5px;">Del</button>
                </td>
            </tr>`;
        });
        document.getElementById('content').innerHTML = html + `</table>`;
    };

    // --- NEW: Add Student Logic ---
    window.addNewStudent = () => {
        const name = document.getElementById('new-name').value;
        const user = document.getElementById('new-user').value;
        const pass = document.getElementById('new-pass').value;

        if (name && user && pass) {
            hsc.addUser(name, user, pass, 'student');
            alert("New student registered successfully.");
            drawUserMgmt(); // Refresh the table
        } else {
            alert("All fields are required.");
        }
    };

    // --- NEW: Edit User Logic ---
    window.saveUser = (id) => {
        const n = document.getElementById(`n-${id}`).value;
        const u = document.getElementById(`u-${id}`).value;
        const p = document.getElementById(`p-${id}`).value;
        hsc.editUser(id, n, u, p);
        alert("Changes saved.");
    };

    window.deleteUser = (id) => {
        if(confirm("Are you sure you want to delete this user?")) {
            hsc.deleteUser(id);
            drawUserMgmt();
        }
    };

    // Other Navigation View Functions (Assignment, Grade, Tracking) go here...
    
    // Default View
    drawUserMgmt();
</script>
