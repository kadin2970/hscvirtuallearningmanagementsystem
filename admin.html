<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HSC Master Terminal</title>
    <style>
        :root { --blue: #003366; --light: #004a99; --white: #ffffff; --danger: #ff4444; --green: #2ecc71; }
        body { background: var(--blue); color: var(--white); font-family: sans-serif; display: flex; margin: 0; height: 100vh; }
        #sidebar { width: 250px; background: var(--light); padding: 20px; border-right: 1px solid rgba(255,255,255,0.1); }
        .nav-btn { width: 100%; padding: 12px; margin-bottom: 8px; background: transparent; color: white; border: 1px solid white; cursor: pointer; border-radius: 4px; text-align: left; font-weight: bold; }
        .nav-btn:hover { background: white; color: var(--blue); }
        #content { flex: 1; padding: 40px; overflow-y: auto; }
        .hsc-input { background: rgba(255,255,255,0.1); border: 1px solid white; color: white; padding: 8px; margin: 5px; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .action-btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; background: var(--green); color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>HSC MASTER</h2>
        <button class="nav-btn" onclick="drawAssignMgmt()">Assignments</button>
        <button class="nav-btn" onclick="drawGradeMgmt()">Grading</button>
        <button class="nav-btn" onclick="drawAudit()">Security & Audit</button>
        <button class="nav-btn" style="margin-top:20px; background:var(--danger); border:none;" onclick="logout()">Sign Out</button>
    </div>
    <div id="content"></div>

    <script type="module">
        import { hsc } from './hsc-core.js';
        const session = JSON.parse(localStorage.getItem('HSC_CURRENT_USER'));
        if (!session || session.role !== 'admin') window.location.href = 'index.html';

        window.logout = () => { localStorage.removeItem('HSC_CURRENT_USER'); window.location.href='index.html'; };

        window.drawAssignMgmt = () => {
            let html = `<h1>Assignments</h1><div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:8px;">
            <h3>Create New</h3>
            <input id="at" class="hsc-input" placeholder="Title"><input id="ap" class="hsc-input" type="number" placeholder="Pts">
            <input id="al" class="hsc-input" placeholder="URL"><input id="ad" class="hsc-input" type="date">
            <button class="action-btn" onclick="addAsgn()">Post</button></div>
            <table><tr><th>Title</th><th>Pts</th><th>Due Date</th><th>Action</th></tr>`;
            
            hsc.db.assignments.forEach(a => {
                html += `<tr>
                    <td><input id="t-${a.id}" class="hsc-input" value="${a.title}" style="width:150px"></td>
                    <td><input id="p-${a.id}" class="hsc-input" type="number" value="${a.points}" style="width:60px"></td>
                    <td><input id="d-${a.id}" class="hsc-input" type="date" value="${a.dueDate === 'No Date' ? '' : a.dueDate}"></td>
                    <td><button class="action-btn" onclick="saveEdit('${a.id}')">Update</button></td>
                </tr>`;
            });
            document.getElementById('content').innerHTML = html + `</table>`;
        };

        window.addAsgn = () => {
            hsc.publishAssignment(document.getElementById('at').value, document.getElementById('ap').value, document.getElementById('al').value, document.getElementById('ad').value);
            drawAssignMgmt();
        };

        window.saveEdit = (id) => {
            const t = document.getElementById(`t-${id}`).value;
            const p = document.getElementById(`p-${id}`).value;
            const d = document.getElementById(`d-${id}`).value;
            const oldLink = hsc.db.assignments.find(a => a.id === id).link;
            hsc.editAssignment(id, t, p, oldLink, d);
            alert("Assignment updated.");
            drawAssignMgmt();
        };

        window.drawGradeMgmt = () => { /* Logic for Grading Table */ };
        window.drawAudit = () => { /* Logic for Audit and Overdue */ };

        drawAssignMgmt();
    </script>
</body>
</html>
