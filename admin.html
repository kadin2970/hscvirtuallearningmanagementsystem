<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HSC Admin Terminal</title>
    <style>
        :root { --hsc-blue: #002147; --hsc-accent: #38bdf8; --hsc-white: #ffffff; }
        body { background: var(--hsc-blue); color: var(--hsc-white); font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        #sidebar { width: 280px; border-right: 1px solid rgba(255,255,255,0.1); padding: 30px; }
        #viewport { flex: 1; padding: 50px; overflow-y: auto; }
        .hsc-input { background: rgba(255,255,255,0.1); border: 1px solid white; color: white; width: 100%; padding: 12px; margin: 10px 0; border-radius: 4px; box-sizing: border-box; }
        .hsc-btn { background: white; color: var(--hsc-blue); border: none; padding: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2 style="letter-spacing: 2px;">HSC ADMIN</h2>
        <button class="hsc-btn" onclick="drawUsers()">Manage Credentials</button>
        <button class="hsc-btn" onclick="drawCreator()">Assignment Creator</button>
        <hr style="margin: 30px 0; opacity: 0.2;">
        <a href="student.html" target="_blank" style="color: var(--hsc-accent); text-decoration: none;">Open Student View →</a>
    </div>
    <div id="viewport">
        <h1>Administrative Command Center</h1>
        <p>Select a module to begin.</p>
    </div>

    <script type="module">
        import { hsc } from './hsc-core.js';

        window.drawUsers = () => {
            let html = `<h2>Credential Registry</h2><table>
                <tr><th>ID</th><th>Name</th><th>Role</th><th>Grade</th><th>Action</th></tr>`;
            hsc.db.users.forEach(u => {
                html += `<tr>
                    <td>${u.id}</td>
                    <td>${u.name}</td>
                    <td>${u.role}</td>
                    <td><input type="text" id="g-${u.id}" value="${u.grade}" style="width:50px; background:none; color:white; border:1px solid #555;"></td>
                    <td><button onclick="updateGrade('${u.id}')">Update</button></td>
                </tr>`;
            });
            document.getElementById('viewport').innerHTML = html + `</table>`;
        };

        window.updateGrade = (id) => {
            const val = document.getElementById(`g-${id}`).value;
            hsc.updateUserGrade(id, val);
            alert("Grade updated in central database.");
        };

        window.drawCreator = () => {
            document.getElementById('viewport').innerHTML = `
                <h2>Create Scholarly Assignment</h2>
                <input id="title" class="hsc-input" placeholder="Assignment Title">
                <textarea id="desc" class="hsc-input" rows="5" placeholder="Instructions"></textarea>
                <input id="link" class="hsc-input" placeholder="External Resource URL">
                <button class="hsc-btn" onclick="publish()">Publish Assignment</button>
            `;
        };

        window.publish = () => {
            hsc.publishAssignment(
                document.getElementById('title').value,
                document.getElementById('desc').value,
                document.getElementById('link').value
            );
            alert("Assignment published.");
            drawCreator();
        };
    </script>
</body>
</html>
