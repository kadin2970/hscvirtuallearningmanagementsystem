<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HSC Admin | Master Control</title>
    <style>
        :root { --hsc-blue: #002147; --hsc-accent: #38bdf8; --hsc-glass: rgba(255,255,255,0.1); }
        body { background: var(--hsc-blue); color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        #nav { width: 250px; border-right: 1px solid var(--hsc-glass); padding: 20px; }
        #view { flex: 1; padding: 40px; overflow-y: auto; }
        .hsc-btn { background: white; color: var(--hsc-blue); border: none; padding: 10px; width: 100%; cursor: pointer; margin-bottom: 10px; font-weight: bold; border-radius: 4px; }
        .hsc-input { background: var(--hsc-glass); border: 1px solid white; color: white; padding: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid var(--hsc-glass); padding: 10px; text-align: left; }
        .section-title { color: var(--hsc-accent); border-bottom: 1px solid var(--hsc-accent); margin-top: 30px; }
    </style>
</head>
<body>
    <div id="nav">
        <h2>HSC ADMIN</h2>
        <button class="hsc-btn" onclick="drawDashboard()">Dashboard</button>
        <button class="hsc-btn" onclick="drawUserCreator()">Create User</button>
        <button class="hsc-btn" onclick="drawAssignmentManager()">Assignments</button>
        <button class="hsc-btn" style="background:#ff4b4b;color:white" onclick="location.href='index.html'">Logout</button>
    </div>
    <div id="view"></div>

    <script type="module">
        import { hsc } from './hsc-core.js';

        window.drawDashboard = () => {
            let html = `<h1>Global Gradebook</h1><table><tr><th>Student</th><th>Final Grade</th><th>Assignment Scores (Points)</th></tr>`;
            hsc.db.users.filter(u => u.role === 'student').forEach(s => {
                html += `<tr>
                    <td><b>${s.name}</b></td>
                    <td style="color:var(--hsc-accent)">${s.finalGrade}</td>
                    <td>`;
                hsc.db.assignments.forEach(a => {
                    const sub = hsc.db.submissions.find(sub => sub.studentId === s.id && sub.assignmentId === a.id);
                    const score = sub ? sub.score : 0;
                    html += `<div>${a.title}: <input type="number" value="${score}" onchange="updateGrade('${s.id}','${a.id}', this.value)" style="width:50px"> / ${a.points}</div>`;
                });
                html += `</td></tr>`;
            });
            document.getElementById('view').innerHTML = html + `</table>`;
        };

        window.updateGrade = (sId, aId, val) => hsc.gradeWork(sId, aId, val);

        window.drawUserCreator = () => {
            document.getElementById('view').innerHTML = `
                <h1>User Creation</h1>
                <input id="n" class="hsc-input" placeholder="Full Name">
                <input id="u" class="hsc-input" placeholder="Username">
                <input id="p" class="hsc-input" placeholder="Password">
                <select id="r" class="hsc-input"><option value="student">Student</option><option value="admin">Admin</option></select>
                <button class="hsc-btn" onclick="createUser()">Add to Registry</button>`;
        };

        window.createUser = () => {
            hsc.addUser(document.getElementById('n').value, document.getElementById('u').value, document.getElementById('p').value, document.getElementById('r').value);
            alert("User Registered."); drawDashboard();
        };

        window.drawAssignmentManager = () => {
            let html = `<h1>Assignment Manager</h1>
                <input id="at" class="hsc-input" placeholder="Title">
                <textarea id="ad" class="hsc-input" placeholder="Description"></textarea>
                <input id="ap" class="hsc-input" type="number" placeholder="Total Points">
                <button class="hsc-btn" onclick="createAssign()">Publish Assignment</button>
                <h3 class="section-title">Active Assignments</h3><ul>`;
            hsc.db.assignments.forEach(a => html += `<li>${a.title} (${a.points} pts)</li>`);
            document.getElementById('view').innerHTML = html + `</ul>`;
        };

        window.createAssign = () => {
            hsc.publishAssignment(document.getElementById('at').value, document.getElementById('ad').value, document.getElementById('ap').value);
            drawAssignmentManager();
        };

        drawDashboard();
    </script>
</body>
</html>
