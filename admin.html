<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HSC Master Terminal</title>
    <style>
        :root { 
            --hsc-blue: #003366; 
            --hsc-light: #004a99;
            --hsc-white: #ffffff;
            --hsc-danger: #d93025;
        }
        body { 
            background: var(--hsc-blue); color: var(--hsc-white); 
            font-family: 'Segoe UI', sans-serif; display: flex; margin: 0; height: 100vh; 
        }
        #sidebar { 
            width: 260px; background: var(--hsc-light); border-right: 1px solid rgba(255,255,255,0.2); 
            padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.5);
        }
        .nav-btn { 
            width: 100%; padding: 12px; margin-bottom: 10px; background: transparent; 
            color: white; border: 1px solid white; cursor: pointer; text-align: left; border-radius: 4px; font-weight: bold;
        }
        .nav-btn:hover { background: white; color: var(--hsc-blue); }
        #content { flex: 1; padding: 40px; overflow-y: auto; }
        .hsc-input { 
            background: rgba(255,255,255,0.1); border: 1px solid white; 
            color: white; padding: 10px; margin: 5px; border-radius: 4px; 
        }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; background: rgba(255,255,255,0.2); }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .action-btn { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-save { background: #2ecc71; color: white; }
        .btn-del { background: var(--hsc-danger); color: white; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>HSC MASTER</h2>
        <button class="nav-btn" onclick="drawUserMgmt()">User Management</button>
        <button class="nav-btn" onclick="drawAssignMgmt()">Assignment Management</button>
        <button class="nav-btn" onclick="drawGradeMgmt()">Grade Management</button>
        <button class="nav-btn" onclick="drawTracking()">Turn In Tracking</button>
        <button class="nav-btn" style="margin-top:30px; background:var(--hsc-danger); border:none;" onclick="logout()">Sign Out</button>
    </div>
    <div id="content"></div>

    <script type="module">
        import { hsc } from './hsc-core.js';

        // --- THE GATEKEEPER ---
        const session = JSON.parse(localStorage.getItem('HSC_CURRENT_USER'));
        if (!session || session.role !== 'admin') {
            const user = session ? session.username : "Guest";
            hsc.logViolation(user, "Admin Terminal Breach Attempt");
            alert("SECURE ACCESS DENIED: Incident Logged.");
            window.location.href = 'index.html';
        }

        // --- GLOBAL UI BINDINGS ---
        window.logout = () => { localStorage.removeItem('HSC_CURRENT_USER'); window.location.href='index.html'; };

        window.drawUserMgmt = () => {
            let html = `<h1>User Management</h1>
            <div style="border:1px solid white; padding:15px; margin-bottom:20px;">
                <h3>Add New Student</h3>
                <input id="cn" class="hsc-input" placeholder="Full Name">
                <input id="cu" class="hsc-input" placeholder="Username">
                <input id="cp" class="hsc-input" type="password" placeholder="Password">
                <button class="action-btn btn-save" onclick="addStudent()">+ Register</button>
            </div>
            <table><tr><th>Name</th><th>Credentials</th><th>Action</th></tr>`;
            hsc.db.users.forEach(u => {
                html += `<tr>
                    <td><input id="n-${u.id}" class="hsc-input" value="${u.name}"></td>
                    <td>U: <input id="u-${u.id}" class="hsc-input" value="${u.username}" style="width:80px"> 
                        P: <input id="p-${u.id}" class="hsc-input" value="${u.password}" style="width:80px"></td>
                    <td><button class="action-btn btn-save" onclick="saveUser('${u.id}')">Save</button>
                        <button class="action-btn btn-del" onclick="delUser('${u.id}')">Del</button></td></tr>`;
            });
            document.getElementById('content').innerHTML = html + `</table>`;
        };

        window.addStudent = () => {
            hsc.addUser(document.getElementById('cn').value, document.getElementById('cu').value, document.getElementById('cp').value, 'student');
            drawUserMgmt();
        };

        window.saveUser = (id) => {
            hsc.editUser(id, document.getElementById(`n-${id}`).value, document.getElementById(`u-${id}`).value, document.getElementById(`p-${id}`).value);
            alert("Saved.");
        };

        window.delUser = (id) => { hsc.deleteUser(id); drawUserMgmt(); };

        window.drawAssignMgmt = () => {
            let html = `<h1>Assignment Management</h1>
            <input id="at" class="hsc-input" placeholder="Title"> 
            <input id="ap" class="hsc-input" type="number" placeholder="Points">
            <input id="al" class="hsc-input" placeholder="URL Link">
            <button class="action-btn btn-save" onclick="addAssign()">Post</button>
            <table><tr><th>Title</th><th>Pts</th><th>Link</th></tr>`;
            hsc.db.assignments.forEach(a => {
                html += `<tr><td>${a.title}</td><td>${a.points}</td><td><a href="${a.link}" target="_blank" style="color:cyan">View Resource</a></td></tr>`;
            });
            document.getElementById('content').innerHTML = html + `</table>`;
        };

        window.addAssign = () => {
            hsc.publishAssignment(document.getElementById('at').value, document.getElementById('ap').value, document.getElementById('al').value);
            drawAssignMgmt();
        };

        window.drawGradeMgmt = () => {
            let html = `<h1>Grade Tracker</h1><table><tr><th>Student</th><th>Point Breakdown</th><th>Final Grade</th><th>Action</th></tr>`;
            hsc.db.users.filter(u => u.role === 'student').forEach(s => {
                const breakdown = hsc.db.assignments.map(a => {
                    const sub = hsc.db.submissions.find(sub => sub.studentId === s.id && sub.assignmentId === a.id);
                    return `<div>${a.title}: ${sub ? sub.score : 0} / ${a.points}</div>`;
                }).join('');
                html += `<tr><td>${s.name}</td><td>${breakdown}</td><td style="font-weight:bold">${s.finalGrade}</td>
                         <td><button class="action-btn btn-save" onclick="drawGrader('${s.id}')">Grade</button></td></tr>`;
            });
            document.getElementById('content').innerHTML = html + `</table>`;
        };

        window.drawGrader = (sId) => {
            const s = hsc.db.users.find(x => x.id === sId);
            let html = `<h2>Grading: ${s.name}</h2>`;
            hsc.db.assignments.forEach(a => {
                const sub = hsc.db.submissions.find(x => x.studentId === sId && x.assignmentId === a.id);
                html += `<div style="margin-bottom:10px;">${a.title} (Max: ${a.points}) 
                         <input class="hsc-input" type="number" id="sc-${a.id}" value="${sub ? sub.score : 0}">
                         <button class="action-btn btn-save" onclick="submitGrade('${sId}','${a.id}')">Set</button></div>`;
            });
            document.getElementById('content').innerHTML = html + `<button class="nav-btn" onclick="drawGradeMgmt()">Back</button>`;
        };

        window.submitGrade = (sId, aId) => {
            hsc.gradeWork(sId, aId, document.getElementById(`sc-${aId}`).value);
            alert("Grade Updated.");
        };

        window.drawTracking = () => {
            let html = `<h1>Submission Logs</h1><table><tr><th>Student</th><th>Assignment</th><th>Timestamp</th></tr>`;
            hsc.db.submissions.forEach(s => {
                const stu = hsc.db.users.find(u => u.id === s.studentId);
                const tsk = hsc.db.assignments.find(a => a.id === s.assignmentId);
                html += `<tr><td>${stu?.name}</td><td>${tsk?.title}</td><td>${s.status}</td></tr>`;
            });
            document.getElementById('content').innerHTML = html + `</table>`;
        };

        // Initialize
        drawUserMgmt();
    </script>
</body>
</html>
