<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HSC Login | Hudson Schooling Corporation</title>
    <style>
        :root { --hsc-blue: #002147; --hsc-accent: #38bdf8; }
        body { 
            background: var(--hsc-blue); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; 
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px; border-radius: 8px; width: 350px; text-align: center;
        }
        .hsc-input {
            width: 100%; padding: 12px; margin: 10px 0;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid white; color: white; border-radius: 4px; box-sizing: border-box;
        }
        .hsc-btn {
            width: 100%; padding: 12px; background: white; color: var(--hsc-blue);
            border: none; font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 10px;
        }
        .hsc-btn:hover { background: var(--hsc-accent); }
        .error { color: #ff6b6b; font-size: 0.8rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <h2 style="letter-spacing: 2px;">HSC ACCESS</h2>
    <p style="opacity: 0.6; font-size: 0.9rem;">Hudson Schooling Corp Login</p>
    
    <input type="text" id="username" class="hsc-input" placeholder="Username">
    <input type="password" id="password" class="hsc-input" placeholder="Password">
    
    <button class="hsc-btn" onclick="attemptLogin()">LOGIN</button>
    <div id="error-msg" class="error">Invalid Username or Password</div>
</div>

<script type="module">
    import { hsc } from './hsc-core.js';

    window.attemptLogin = () => {
        const userVal = document.getElementById('username').value;
        const passVal = document.getElementById('password').value;
        const error = document.getElementById('error-msg');

        // Logic check against updated database
        const user = hsc.db.users.find(u => u.username === userVal && u.password === passVal);

        if (user) {
            localStorage.setItem('HSC_CURRENT_USER', JSON.stringify(user));
            if (user.role === 'admin') window.location.href = 'admin.html';
            else window.location.href = 'student.html';
        } else {
            error.style.display = 'block';
        }
    };
</script>

</body>
</html>
