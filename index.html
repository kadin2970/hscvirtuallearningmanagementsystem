<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HSC Login</title>
    <style>
        :root { --hsc-blue: #002147; --hsc-accent: #38bdf8; }
        body { background: var(--hsc-blue); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 8px; width: 320px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; background: white; color: var(--hsc-blue); border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>HSC LOGIN</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" onclick="login()">LOGIN</button>
        <p id="err" style="color:#ff6b6b; display:none;">Access Denied</p>
    </div>

    <script type="module">
        import { hsc } from './hsc-core.js';
        window.login = () => {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const found = hsc.db.users.find(user => user.username === u && user.password === p);
            
            if (found) {
                localStorage.setItem('HSC_CURRENT_USER', JSON.stringify(found));
                window.location.href = found.role === 'admin' ? 'admin.html' : 'student.html';
            } else {
                document.getElementById('err').style.display = 'block';
            }
        };
    </script>
</body>
</html>
