<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HSC Login</title>
    <style>
        :root { --hsc-blue: #002147; --hsc-accent: #38bdf8; }
        body { background: var(--hsc-blue); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: rgba(255,255,255,0.05); padding: 40px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 4px; border: none; }
        button { width: 100%; padding: 10px; background: var(--hsc-accent); color: var(--hsc-blue); border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>HSC ACCESS</h2>
        <input type="text" id="u" placeholder="Username">
        <input type="password" id="p" placeholder="Password">
        <button onclick="login()">LOGIN</button>
    </div>
    <script type="module">
        import { hsc } from './hsc-core.js';
        window.login = () => {
            const user = hsc.db.users.find(x => x.username === document.getElementById('u').value && x.password === document.getElementById('p').value);
            if (user) {
                localStorage.setItem('HSC_CURRENT_USER', JSON.stringify(user));
                window.location.href = user.role === 'admin' ? 'admin.html' : 'student.html';
            } else { alert("Invalid Credentials"); }
        };
    </script>
</body>
</html>
