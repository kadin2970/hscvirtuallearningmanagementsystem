<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSC | Secure Login</title>
    <style>
        :root { 
            --hsc-blue: #003366; 
            --hsc-light: #004a99;
            --hsc-white: #ffffff;
            --hsc-accent: #00d4ff;
        }
        body { 
            background: var(--hsc-blue); 
            color: var(--hsc-white); 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-box { 
            background: var(--hsc-light); 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            width: 350px; 
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h2 { margin-bottom: 30px; letter-spacing: 2px; }
        .hsc-input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            background: rgba(255,255,255,0.1); 
            border: 1px solid white; 
            color: white; 
            border-radius: 4px; 
            box-sizing: border-box;
        }
        .hsc-input::placeholder { color: rgba(255,255,255,0.6); }
        .login-btn { 
            width: 100%; 
            padding: 12px; 
            margin-top: 20px; 
            background: var(--hsc-accent); 
            color: var(--hsc-blue); 
            border: none; 
            border-radius: 4px; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase;
            transition: 0.3s;
        }
        .login-btn:hover { background: var(--hsc-white); }
        .footer-text { margin-top: 20px; font-size: 0.8rem; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>HUDSON SCHOOLING<br>CORP</h2>
        <input type="text" id="username" class="hsc-input" placeholder="Username">
        <input type="password" id="password" class="hsc-input" placeholder="Password">
        <button class="login-btn" onclick="handleLogin()">Authorize Access</button>
        <div class="footer-text">Secure Encrypted Terminal v3.0</div>
    </div>

    <script type="module">
        import { hsc } from './hsc-core.js';

        window.handleLogin = () => {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            // Search database for matching credentials
            const user = hsc.db.users.find(x => x.username === u && x.password === p);

            if (user) {
                // Set the session
                localStorage.setItem('HSC_CURRENT_USER', JSON.stringify(user));
                
                // Route based on role
                if (user.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'student.html';
                }
            } else {
                alert("ACCESS DENIED: Invalid Credentials.");
            }
        };
    </script>
</body>
</html>
