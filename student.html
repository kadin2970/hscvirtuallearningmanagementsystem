<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HSC Student Portal</title>
    <style>
        :root { --hsc-blue: #002147; --hsc-accent: #38bdf8; }
        body { background: var(--hsc-blue); color: white; font-family: sans-serif; padding: 40px; }
        .header { border-bottom: 2px solid var(--hsc-accent); padding-bottom: 10px; display: flex; justify-content: space-between; }
        .btn { padding: 8px 16px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h1>STUDENT PORTAL</h1>
        <button class="btn" onclick="logout()">Sign Out</button>
    </div>
    <div id="main"></div>

    <script type="module">
        import { hsc } from './hsc-core.js';

        // --- THE GATEKEEPER INTEGRATION ---
        const session = JSON.parse(localStorage.getItem('HSC_CURRENT_USER'));
        if (!session) {
            window.location.href = 'index.html';
        }

        window.logout = () => {
            localStorage.removeItem('HSC_CURRENT_USER');
            window.location.href = 'index.html';
        };

        document.getElementById('main').innerHTML = `<h3>Academic Record for ${session.name}</h3><p>Current Grade: ${session.finalGrade}</p>`;
    </script>
</body>
</html>
