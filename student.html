<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HSC Student Portal</title>
    <style>
        :root { --hsc-blue: #002147; --hsc-accent: #38bdf8; }
        body { background: var(--hsc-blue); color: white; font-family: sans-serif; padding: 60px; margin: 0; }
        .hsc-header { border-bottom: 2px solid var(--hsc-accent); margin-bottom: 40px; padding-bottom: 20px; }
        .card { background: rgba(255,255,255,0.05); padding: 30px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); border-left: 5px solid var(--hsc-accent); }
        .btn { background: var(--hsc-accent); color: var(--hsc-blue); border: none; padding: 12px 24px; font-weight: bold; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="hsc-header">
        <h1>HUDSON STUDENT TERMINAL</h1>
    </div>
    <div id="assignment-feed"></div>

    <script type="module">
        import { hsc } from './hsc-core.js';
        const feed = document.getElementById('assignment-feed');

        if (hsc.db.assignments.length === 0) {
            feed.innerHTML = "<p>No active assignments.</p>";
        }

        hsc.db.assignments.forEach(task => {
            const el = document.createElement('div');
            el.className = 'card';
            el.innerHTML = `
                <h2>${task.title}</h2>
                <p>${task.desc}</p>
                <a href="${task.link}" target="_blank" style="color:var(--hsc-accent)">Open Reference</a><br><br>
                <button class="btn" onclick="alert('Work Transmitted.')">TURN IN</button>
            `;
            feed.appendChild(el);
        });
    </script>
</body>
</html>
