<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HSC Student Portal</title>
    <style>
        :root { --hsc-blue: #002147; --hsc-accent: #38bdf8; }
        body { background: var(--hsc-blue); color: white; font-family: sans-serif; padding: 40px; }
        .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid var(--hsc-accent); }
        .grade { font-size: 2rem; color: var(--hsc-accent); font-weight: bold; }
    </style>
</head>
<body>
    <div style="display:flex; justify-content:space-between">
        <h1>Student Workspace</h1>
        <button onclick="location.reload()">Refresh Data</button>
    </div>

    <div class="card">
        <h3>Current Academic Standing</h3>
        <div id="final-grade" class="grade">Loading...</div>
    </div>

    <div id="feed"></div>

    <script type="module">
        import { hsc } from './hsc-core.js';
        const session = JSON.parse(localStorage.getItem('HSC_CURRENT_USER'));
        if (!session) window.location.href = 'index.html';

        // Update Grade Display
        const me = hsc.db.users.find(u => u.id === session.id);
        document.getElementById('final-grade').innerText = me.finalGrade;

        const feed = document.getElementById('feed');
        hsc.db.assignments.forEach(a => {
            const sub = hsc.db.submissions.find(s => s.studentId === session.id && s.assignmentId === a.id);
            const status = sub ? sub.status : "Not Submitted";
            feed.innerHTML += `
                <div class="card">
                    <h3>${a.title} (${a.points} Points)</h3>
                    <p>Status: ${status} | Score: ${sub ? sub.score : 0}</p>
                    <a href="${a.link}" target="_blank" style="color:var(--hsc-accent)">Open Resources</a><br><br>
                    <button onclick="hsc.submitAssignment('${session.id}', '${a.id}'); location.reload();" ${status === "Turned In" ? 'disabled' : ''}>
                        Turn In Assignment
                    </button>
                </div>`;
        });
    </script>
</body>
</html>
