<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HSC Student Portal</title>
    <style>
        :root { 
            --hsc-blue: #003366; 
            --hsc-light: #004a99;
            --hsc-white: #ffffff;
            --hsc-accent: #00d4ff;
        }
        body { 
            background: var(--hsc-blue); color: var(--hsc-white); 
            font-family: 'Segoe UI', sans-serif; margin: 0; padding: 40px; 
        }
        .header { 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid white; padding-bottom: 20px; margin-bottom: 30px;
        }
        .stats-container {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;
        }
        .stat-card {
            background: var(--hsc-light); padding: 20px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2); text-align: center;
        }
        .grade-text { font-size: 2.5rem; font-weight: bold; color: var(--hsc-accent); }
        
        .assignment-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { 
            background: rgba(255,255,255,0.05); padding: 20px; border-radius: 8px; 
            border-left: 5px solid var(--hsc-accent); transition: 0.3s;
        }
        .card:hover { background: rgba(255,255,255,0.1); }
        
        .btn { 
            width: 100%; padding: 12px; margin-top: 15px; border: none; border-radius: 4px;
            cursor: pointer; font-weight: bold; text-transform: uppercase;
        }
        .btn-submit { background: var(--hsc-accent); color: var(--hsc-blue); }
        .btn-submit:disabled { background: #555; color: #aaa; cursor: not-allowed; }
        
        a.resource-link { 
            display: inline-block; margin-top: 10px; color: var(--hsc-accent); 
            text-decoration: none; font-weight: bold;
        }
        a.resource-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="header">
        <h1>HSC Student Workspace</h1>
        <button onclick="location.reload()" style="padding:10px; cursor:pointer;">Refresh Data</button>
    </div>

    <div class="stats-container">
        <div class="stat-card">
            <h3>Current Final Grade</h3>
            <div id="display-grade" class="grade-text">--%</div>
        </div>
        <div class="stat-card">
            <h3>Total Points Earned</h3>
            <div id="display-points" class="grade-text">0</div>
        </div>
    </div>

    <h2>Active Assignments</h2>
    <div id="feed" class="assignment-grid"></div>

    <script type="module">
        import { hsc } from './hsc-core.js';

        // Session Check
        const session = JSON.parse(localStorage.getItem('HSC_CURRENT_USER'));
        if (!session || session.role !== 'student') {
            window.location.href = 'index.html';
        }

        const me = hsc.db.users.find(u => u.id === session.id);
        const feed = document.getElementById('feed');

        // Update Header Stats
        document.getElementById('display-grade').innerText = me.finalGrade;
        
        const mySubmissions = hsc.db.submissions.filter(s => s.studentId === me.id);
        const totalPoints = mySubmissions.reduce((acc, curr) => acc + (curr.score || 0), 0);
        document.getElementById('display-points').innerText = totalPoints;

        // Draw Assignments
        if (hsc.db.assignments.length === 0) {
            feed.innerHTML = "<p>No assignments posted yet.</p>";
        }

        hsc.db.assignments.forEach(task => {
            const sub = hsc.db.submissions.find(s => s.studentId === me.id && s.assignmentId === task.id);
            const isSubmitted = sub && sub.status === "Turned In";
            const score = sub ? sub.score : 0;

            feed.innerHTML += `
                <div class="card">
                    <h3>${task.title}</h3>
                    <p>Max Points: ${task.points}</p>
                    <p>Your Score: <strong>${score}</strong></p>
                    <p>Status: ${isSubmitted ? "✅ Submitted" : "❌ Pending"}</p>
                    
                    <a href="${task.link}" target="_blank" class="resource-link">
                        ${task.link !== "#" ? "🔗 Open External Resource" : "No External Link"}
                    </a>

                    <button class="btn btn-submit" 
                        onclick="turnIn('${task.id}')" 
                        ${isSubmitted ? 'disabled' : ''}>
                        ${isSubmitted ? 'Already Turned In' : 'Turn In Assignment'}
                    </button>
                </div>
            `;
        });

        // Global function for the button
        window.turnIn = (taskId) => {
            hsc.submitAssignment(me.id, taskId);
            alert("Assignment successfully turned in!");
            location.reload();
        };
    </script>
</body>
</html>
