<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HSC Student Portal</title>
    <style>
        :root { --hsc-blue: #002147; --hsc-accent: #38bdf8; --hsc-glass: rgba(255, 255, 255, 0.1); }
        body { background: var(--hsc-blue); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--hsc-glass);
        }

        .hsc-header { padding: 40px 60px; border-left: 5px solid var(--hsc-accent); margin: 40px 60px; }
        .feed-container { padding: 0 60px; }
        
        .assignment-card { 
            background: var(--hsc-glass); 
            border: 1px solid rgba(255,255,255,0.1); 
            padding: 30px; 
            margin-bottom: 25px; 
            border-radius: 4px; 
        }

        .hsc-btn { 
            background: var(--hsc-accent); 
            color: var(--hsc-blue); 
            border: none; 
            padding: 12px 24px; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 4px; 
            margin-top: 15px; 
        }

        .logout-btn {
            background: none;
            border: 1px solid white;
            color: white;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.8rem;
            border-radius: 4px;
        }
        .logout-btn:hover { background: #ff4b4b; border-color: #ff4b4b; }
        
        .link { color: var(--hsc-accent); text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div style="font-weight: bold; letter-spacing: 1px;">HUDSON SCHOOLING CORP</div>
        <button class="logout-btn" onclick="logout()">Sign Out</button>
    </nav>

    <div class="hsc-header">
        <h1 style="margin:0;">STUDENT TERMINAL</h1>
        <p id="welcome-msg" style="opacity: 0.7;">Secure Session Active</p>
    </div>

    <div id="feed" class="feed-container"></div>

    <script type="module">
        import { hsc } from './hsc-core.js';

        // Security Check: Redirect if not logged in
        const session = JSON.parse(localStorage.getItem('HSC_CURRENT_USER'));
        if (!session) window.location.href = 'index.html';
        
        document.getElementById('welcome-msg').innerText = `Welcome, ${session.name} | Grade: ${session.grade}`;

        const feed = document.getElementById('feed');
        
        if (hsc.db.assignments.length === 0) {
            feed.innerHTML = "<p style='opacity:0.5'>No scholarly tasks currently assigned.</p>";
        }

        hsc.db.assignments.forEach(task => {
            const card = document.createElement('div');
            card.className = 'assignment-card';
            card.innerHTML = `
                <h2 style="margin-top:0; color:var(--hsc-accent)">${task.title}</h2>
                <p style="line-height: 1.6; opacity: 0.9;">${task.desc}</p>
                <a href="${task.link}" target="_blank" class="link">🔗 Open External Resource</a>
                <br>
                <button class="hsc-btn" onclick="turnIn('${task.id}')">SUBMIT ASSIGNMENT</button>
            `;
            feed.appendChild(card);
        });

        window.turnIn = (id) => {
            alert("Transmission Successful. Work logged in HSC Vault.");
        };

        window.logout = () => {
            localStorage.removeItem('HSC_CURRENT_USER');
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
