<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HSC Student Portal</title>
    <style>
        :root { --blue: #003366; --white: #ffffff; --accent: #00d4ff; }
        body { background: var(--blue); color: var(--white); font-family: sans-serif; padding: 40px; }
        .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid var(--accent); }
    </style>
</head>
<body>
    <h1>Student Workspace</h1>
    <div id="feed"></div>
    <script type="module">
        import { hsc } from './hsc-core.js';
        const session = JSON.parse(localStorage.getItem('HSC_CURRENT_USER'));
        const me = hsc.db.users.find(u => u.id === session.id);
        const feed = document.getElementById('feed');
        
        // Only vanish if the assignment status is strictly "Graded"
        const activeTasks = hsc.db.assignments.filter(task => {
            const sub = hsc.db.submissions.find(s => s.studentId === me.id && s.assignmentId === task.id);
            return !(sub && sub.status === "Graded");
        });

        activeTasks.forEach(task => {
            const sub = hsc.db.submissions.find(s => s.studentId === me.id && s.assignmentId === task.id);
            const isTurnedIn = sub && sub.status === "Turned In";
            feed.innerHTML += `<div class="card">
                <h3>${task.title}</h3>
                <p>Status: ${isTurnedIn ? "✅ Turned In (Pending Grade)" : "❌ Not Submitted"}</p>
                <button onclick="hsc.submitAssignment('${me.id}','${task.id}'); location.reload()" 
                    ${isTurnedIn ? 'disabled' : ''}>
                    ${isTurnedIn ? 'Awaiting Grade' : 'Turn In Now'}
                </button>
            </div>`;
        });
    </script>
</body>
</html>
