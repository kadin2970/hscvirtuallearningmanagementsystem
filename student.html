<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HSC Student Portal</title>
    <style>
        :root { --blue: #003366; --white: #ffffff; --accent: #00d4ff; --danger: #ff4444; }
        body { background: var(--blue); color: var(--white); font-family: sans-serif; padding: 40px; }
        .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid var(--accent); }
        .grade-text { font-size: 2.5rem; font-weight: bold; color: var(--accent); }
        .btn-submit { padding: 12px; background: var(--accent); color: var(--blue); border: none; font-weight: bold; cursor: pointer; width: 100%; border-radius: 4px; }
    </style>
</head>
<body>
    <div style="display:flex; justify-content:space-between; border-bottom:1px solid white;">
        <h1>Student Workspace</h1>
        <button onclick="location.reload()">Refresh</button>
    </div>
    <div style="margin: 20px 0; text-align: center;">
        <h3>Final Grade</h3>
        <div id="display-grade" class="grade-text">N/A</div>
    </div>
    <div id="feed"></div>

    <script type="module">
        import { hsc } from './hsc-core.js';
        const session = JSON.parse(localStorage.getItem('HSC_CURRENT_USER'));
        if (!session) window.location.href = 'index.html';

        const me = hsc.db.users.find(u => u.id === session.id);
        document.getElementById('display-grade').innerText = me.finalGrade || "N/A";

        const feed = document.getElementById('feed');
        const activeTasks = hsc.db.assignments.filter(task => {
            const sub = hsc.db.submissions.find(s => s.studentId === me.id && s.assignmentId === task.id);
            return !(sub && sub.status === "Graded");
        });

        activeTasks.forEach(task => {
            const sub = hsc.db.submissions.find(s => s.studentId === me.id && s.assignmentId === task.id);
            const isTurnedIn = sub && sub.status === "Turned In";
            const today = new Date().toISOString().split('T')[0];
            const isOverdue = task.dueDate !== "No Date" && task.dueDate < today && !isTurnedIn;

            feed.innerHTML += `<div class="card" style="${isOverdue ? 'border-left-color:var(--danger)' : ''}">
                <h3>${task.title}</h3>
                <p><strong>Due:</strong> <span style="color:${isOverdue ? 'var(--danger)' : 'white'}">${task.dueDate} ${isOverdue ? '⚠️ OVERDUE' : ''}</span></p>
                <p>Points: ${task.points}</p>
                <button class="btn-submit" onclick="turnIn('${task.id}')" ${isTurnedIn ? 'disabled' : ''}>
                    ${isTurnedIn ? 'Awaiting Grade' : 'Turn In Now'}
                </button>
            </div>`;
        });

        window.turnIn = (taskId) => { hsc.submitAssignment(me.id, taskId); location.reload(); };
    </script>
</body>
</html>
